<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Controle Logístico - Assinatura Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px 30px;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #2d3748;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 i {
            color: #667eea;
        }

        .filters-section {
            background: white;
            padding: 20px 25px;
            border-radius: 12px;
            margin: 20px 0;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 250px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }

        .filter-group select {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            background: #fafbfc;
        }

        .filter-group select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .btn-reset {
            background: #fc8181;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-reset:hover {
            background: #f56565;
        }

        .tecnico-card {
            background: white;
            border-radius: 15px;
            padding: 20px 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            border-left: 5px solid #667eea;
        }

        .tecnico-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-item .label {
            font-size: 12px;
            color: #718096;
            margin-bottom: 5px;
        }

        .info-item .value {
            font-size: 15px;
            font-weight: 600;
            color: #2d3748;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .stat-box i {
            font-size: 20px;
            color: #667eea;
            margin-bottom: 8px;
        }

        .stat-box .number {
            font-size: 24px;
            font-weight: 700;
            color: #2d3748;
        }

        .stat-box .label {
            font-size: 13px;
            color: #718096;
        }

        .itens-section {
            background: white;
            border-radius: 15px;
            padding: 20px 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title h2 {
            color: #2d3748;
            font-size: 20px;
        }

        .progress-bar {
            width: 150px;
            height: 8px;
            background: #edf2f7;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #48bb78, #38a169);
            transition: width 0.3s;
        }

        .itens-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .item-card {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s;
        }

        .item-card.verified {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .item-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .item-numero {
            font-weight: 700;
            color: #4a5568;
            background: #edf2f7;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 14px;
        }

        .serial-group {
            flex: 2;
            min-width: 150px;
        }

        .serial-group label {
            font-size: 12px;
            color: #718096;
            margin-bottom: 3px;
            display: block;
        }

        .serial-input {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.3s;
        }

        .serial-input:focus {
            border-color: #667eea;
            outline: none;
        }

        .serial-input.verified {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .conferente-group {
            flex: 2;
            min-width: 150px;
        }

        .conferente-group label {
            font-size: 12px;
            color: #718096;
            margin-bottom: 3px;
            display: block;
        }

        .conferente-input {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.3s;
        }

        .conferente-input:focus {
            border-color: #667eea;
            outline: none;
        }

        .conferente-input.filled {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-badge.pending {
            background: #fed7d7;
            color: #c53030;
        }

        .status-badge.verified {
            background: #c6f6d5;
            color: #22543d;
        }

        .item-content {
            display: grid;
            grid-template-columns: 1fr 120px;
            gap: 15px;
            align-items: start;
        }

        /* Área de Assinatura Digital */
        .signature-container {
            background: white;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #e2e8f0;
        }

        .signature-title {
            font-size: 12px;
            color: #4a5568;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .signature-area {
            position: relative;
            width: 100%;
            height: 70px;
            border: 2px dashed #cbd5e0;
            border-radius: 6px;
            background-color: white;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .signature-canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        .signature-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #a0aec0;
            font-size: 11px;
            text-align: center;
            pointer-events: none;
        }

        .signature-buttons {
            display: flex;
            gap: 5px;
        }

        .signature-btn {
            flex: 1;
            padding: 5px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-clear {
            background: #edf2f7;
            color: #4a5568;
        }

        .btn-clear:hover {
            background: #e2e8f0;
        }

        .btn-validate {
            background: #48bb78;
            color: white;
        }

        .btn-validate:hover {
            background: #38a169;
        }

        .btn-validate.validated {
            background: #2f855a;
        }

        .signature-info {
            margin-top: 8px;
            padding: 6px;
            background: #f0fff4;
            border-radius: 4px;
            border-left: 3px solid #48bb78;
            display: none;
        }

        .signature-info.active {
            display: block;
        }

        .signature-info p {
            font-size: 11px;
            color: #22543d;
        }

        .foto-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-photo {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-photo:hover {
            background: #5a67d8;
        }

        .btn-photo.has-photo {
            background: #48bb78;
        }

        .foto-thumb {
            width: 100%;
            height: 70px;
            border-radius: 6px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7fafc;
        }

        .foto-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .foto-thumb i {
            font-size: 20px;
            color: #cbd5e0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 15px;
            max-width: 450px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .modal-header h3 {
            color: #2d3748;
            font-size: 18px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #a0aec0;
        }

        #video {
            width: 100%;
            border-radius: 10px;
            background: #000;
        }

        .photo-preview {
            width: 100%;
            min-height: 180px;
            border: 2px dashed #cbd5e0;
            border-radius: 10px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .photo-preview img {
            max-width: 100%;
            max-height: 250px;
        }

        .camera-controls {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cam-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary {
            background: #48bb78;
            color: white;
        }

        .btn-secondary {
            background: #a0aec0;
            color: white;
        }

        .btn-danger {
            background: #fc8181;
            color: white;
        }

        .global-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #e2e8f0;
        }

        .btn-export {
            background: #2d3748;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-export:hover {
            background: #1a202c;
        }

        .btn-reset-all {
            background: #fc8181;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-reset-all:hover {
            background: #f56565;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-file-signature"></i>
                Sistema de Controle Logístico - Assinatura Digital
            </h1>
        </div>

        <div class="filters-section">
            <div class="filter-group">
                <label><i class="fas fa-user-tie"></i> Supervisor</label>
                <select id="supervisorFilter">
                    <option value="">Todos os Supervisores</option>
                </select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-user-cog"></i> Técnico</label>
                <select id="tecnicoFilter">
                    <option value="">Selecione um técnico</option>
                </select>
            </div>
            <button class="btn-reset" id="resetFilters">
                <i class="fas fa-undo-alt"></i> Limpar
            </button>
        </div>

        <div id="tecnicoContent" style="display: none;">
            <div class="tecnico-card">
                <h3 style="color: #2d3748; display: flex; align-items: center; gap: 8px; font-size: 16px;">
                    <i class="fas fa-user-circle" style="color: #667eea;"></i>
                    Dados do Técnico
                </h3>
                <div class="tecnico-grid" id="tecnicoInfo"></div>
            </div>

            <div class="stats-container">
                <div class="stat-box">
                    <i class="fas fa-boxes"></i>
                    <div class="number" id="totalItens">10</div>
                    <div class="label">Total</div>
                </div>
                <div class="stat-box">
                    <i class="fas fa-check-circle"></i>
                    <div class="number" id="verificadosCount">0</div>
                    <div class="label">Verificados</div>
                </div>
                <div class="stat-box">
                    <i class="fas fa-camera"></i>
                    <div class="number" id="fotosCount">0</div>
                    <div class="label">Fotos</div>
                </div>
                <div class="stat-box">
                    <i class="fas fa-pen"></i>
                    <div class="number" id="assinaturasCount">0</div>
                    <div class="label">Assinaturas</div>
                </div>
                <div class="stat-box">
                    <i class="fas fa-user-check"></i>
                    <div class="number" id="conferentesCount">0</div>
                    <div class="label">Conferentes</div>
                </div>
            </div>

            <div class="itens-section">
                <div class="section-title">
                    <h2><i class="fas fa-list"></i> Registro de Itens (Máx. 10)</h2>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                    </div>
                </div>

                <div class="itens-container" id="itensContainer"></div>
            </div>

            <div class="global-actions">
                <button class="btn-reset-all" id="resetAll">
                    <i class="fas fa-redo-alt"></i> Resetar Tudo
                </button>
                <button class="btn-export" id="exportPDF">
                    <i class="fas fa-file-pdf"></i> Exportar PDF com Assinaturas
                </button>
            </div>
        </div>
    </div>

    <div class="modal" id="cameraModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-camera"></i> Foto do Equipamento</h3>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <video id="video" autoplay playsinline></video>
            <div class="photo-preview">
                <canvas id="canvas" style="display: none;"></canvas>
                <img id="photo" src="" alt="Preview" style="display: none;">
            </div>
            <div class="camera-controls">
                <button class="cam-btn btn-primary" id="capturePhoto">
                    <i class="fas fa-camera"></i> Tirar Foto
                </button>
                <button class="cam-btn btn-secondary" id="retakePhoto" style="display: none;">
                    <i class="fas fa-redo"></i> Repetir
                </button>
                <button class="cam-btn btn-danger" id="savePhoto">
                    <i class="fas fa-save"></i> Salvar
                </button>
            </div>
        </div>
    </div>

        // Função para extrair lista única de supervisores
        function getSupervisores() {
            const supervisores = [...new Set(tecnicosData.map(t => t.supervisor))].filter(s => s && s.trim() !== '');
            return supervisores.sort((a, b) => a.localeCompare(b));
        }

        // Inicializar supervisores
        function inicializarSupervisores() {
            const supervisores = getSupervisores();
            supervisorFilter.innerHTML = '<option value="">Todos os Supervisores</option>';
            supervisores.forEach(sup => {
                const option = document.createElement('option');
                option.value = sup;
                option.textContent = sup;
                supervisorFilter.appendChild(option);
            });
        }

        // Função para obter técnicos únicos por TR
        function getTecnicosUnicos(array) {
            const map = new Map();
            array.forEach(item => {
                if (item.tr && item.tr.trim() !== '') {
                    map.set(item.tr, item);
                }
            });
            return Array.from(map.values());
        }

        // Atualizar técnicos baseado no supervisor selecionado
        function atualizarTecnicos() {
            const supervisor = supervisorFilter.value;
            let tecnicosFiltrados = [];
            
            if (!supervisor) {
                // Se "Todos os Supervisores", mostra todos os técnicos únicos
                tecnicosFiltrados = getTecnicosUnicos(tecnicosData);
            } else {
                // Filtra pelo supervisor selecionado
                tecnicosFiltrados = tecnicosData.filter(t => t.supervisor === supervisor);
                tecnicosFiltrados = getTecnicosUnicos(tecnicosFiltrados);
            }
            
            // Ordena por nome
            tecnicosFiltrados.sort((a, b) => a.funcionario.localeCompare(b.funcionario));
            
            tecnicoFilter.innerHTML = '<option value="">Selecione um técnico</option>';
            tecnicosFiltrados.forEach(tec => {
                const option = document.createElement('option');
                option.value = tec.tr;
                option.textContent = `${tec.funcionario} (${tec.tr})`;
                tecnicoFilter.appendChild(option);
            });
            
            // Se não houver técnicos, desabilita o select
            tecnicoFilter.disabled = tecnicosFiltrados.length === 0;
        }

        // Selecionar técnico
        function selecionarTecnico(tr) {
            const tecnico = tecnicosData.find(t => t.tr === tr);
            if (!tecnico) return;
            
            currentTecnico = tecnico;
            
            // Atualizar informações do técnico
            tecnicoInfo.innerHTML = `
                <div class="info-item"><span class="label">Funcionário</span><span class="value">${tecnico.funcionario}</span></div>
                <div class="info-item"><span class="label">TR</span><span class="value">${tecnico.tr}</span></div>
                <div class="info-item"><span class="label">TT</span><span class="value">${tecnico.tt}</span></div>
                <div class="info-item"><span class="label">Supervisor</span><span class="value">${tecnico.supervisor}</span></div>
                <div class="info-item"><span class="label">Setor</span><span class="value">${tecnico.setor}</span></div>
                <div class="info-item"><span class="label">Município</span><span class="value">${tecnico.municipio || '-'}</span></div>
                <div class="info-item"><span class="label">Coordenador</span><span class="value">${tecnico.coordenador || '-'}</span></div>
                <div class="info-item"><span class="label">UF</span><span class="value">${tecnico.uf}</span></div>
            `;
            
            // Inicializar registros se não existir
            if (!registros[tecnico.tr]) {
                registros[tecnico.tr] = {
                    tecnico: tecnico,
                    itens: Array(10).fill(null).map((_, index) => ({
                        id: index + 1,
                        serial: '',
                        conferente: '',
                        assinatura: null,
                        verificado: false,
                        foto: null
                    }))
                };
            }
            
            tecnicoContent.style.display = 'block';
            setTimeout(() => renderizarItens(), 100);
        }

        // Renderizar itens
        function renderizarItens() {
            if (!currentTecnico) return;
            
            const registro = registros[currentTecnico.tr];
            if (!registro) return;
            
            itensContainer.innerHTML = '';
            
            registro.itens.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `item-card ${item.verificado ? 'verified' : ''}`;
                
                card.innerHTML = `
                    <div class="item-header">
                        <div class="item-numero">${index + 1}</div>
                        
                        <div class="serial-group">
                            <label>Número Serial</label>
                            <input type="text" class="serial-input" 
                                   value="${item.serial}" placeholder="Digite o serial" data-index="${index}">
                        </div>
                        
                        <div class="conferente-group">
                            <label>Nome do Conferente</label>
                            <input type="text" class="conferente-input ${item.conferente ? 'filled' : ''}" 
                                   value="${item.conferente}" placeholder="Nome do conferente" data-index="${index}">
                        </div>
                        
                        <span class="status-badge ${item.verificado ? 'verified' : 'pending'}">
                            ${item.verificado ? 'VERIFICADO' : 'PENDENTE'}
                        </span>
                    </div>
                    
                    <div class="item-content">
                        <div class="signature-container">
                            <div class="signature-title">Assinatura Digital do Conferente</div>
                            <div class="signature-area">
                                <canvas class="signature-canvas" id="sigCanvas-${index}"></canvas>
                                <div class="signature-placeholder" id="sigPlaceholder-${index}">
                                    <i class="fas fa-signature" style="font-size: 16px;"></i><br>
                                    Assine aqui
                                </div>
                            </div>
                            
                            <div class="signature-buttons">
                                <button class="signature-btn btn-clear" id="clearSig-${index}">
                                    <i class="fas fa-eraser"></i> Limpar
                                </button>
                                <button class="signature-btn btn-validate ${item.assinatura ? 'validated' : ''}" id="validateSig-${index}">
                                    <i class="fas fa-check-circle"></i> Validar
                                </button>
                            </div>
                            
                            <div class="signature-info ${item.assinatura ? 'active' : ''}" id="sigInfo-${index}">
                                <p><i class="fas fa-check-circle" style="color: #48bb78;"></i> Assinatura validada</p>
                            </div>
                        </div>
                        
                        <div class="foto-group">
                            <button class="btn-photo ${item.foto ? 'has-photo' : ''}" data-index="${index}">
                                <i class="fas ${item.foto ? 'fa-camera-retro' : 'fa-camera'}"></i>
                                ${item.foto ? 'Foto OK' : 'Tirar Foto'}
                            </button>
                            <div class="foto-thumb" onclick="${item.foto ? `window.open('${item.foto}', '_blank')` : ''}">
                                ${item.foto ? `<img src="${item.foto}" alt="Foto">` : '<i class="fas fa-camera"></i>'}
                            </div>
                        </div>
                    </div>
                `;
                
                itensContainer.appendChild(card);
                
                // Eventos do serial e conferente
                const serialInput = card.querySelector('.serial-input');
                const conferenteInput = card.querySelector('.conferente-input');
                
                serialInput.addEventListener('input', (e) => {
                    item.serial = e.target.value;
                    verificarStatus(index);
                });
                
                conferenteInput.addEventListener('input', (e) => {
                    item.conferente = e.target.value;
                    if (e.target.value) {
                        conferenteInput.classList.add('filled');
                    } else {
                        conferenteInput.classList.remove('filled');
                    }
                    verificarStatus(index);
                });
                
                // Inicializar assinatura
                setTimeout(() => {
                    const canvas = document.getElementById(`sigCanvas-${index}`);
                    if (canvas) {
                        canvas.width = canvas.offsetWidth;
                        canvas.height = canvas.offsetHeight;
                        
                        const pad = new SignaturePad(canvas, {
                            backgroundColor: 'rgb(255, 255, 255)',
                            penColor: '#2d3748',
                            minWidth: 1,
                            maxWidth: 2
                        });
                        
                        signaturePads[`${currentTecnico.tr}_${index}`] = pad;
                        
                        // Se já tiver assinatura salva, restaurar
                        if (item.assinatura) {
                            pad.fromDataURL(item.assinatura);
                            document.getElementById(`sigPlaceholder-${index}`).style.display = 'none';
                        }
                        
                        pad.addEventListener('beginStroke', () => {
                            document.getElementById(`sigPlaceholder-${index}`).style.display = 'none';
                        });
                        
                        document.getElementById(`clearSig-${index}`).onclick = () => {
                            pad.clear();
                            document.getElementById(`sigPlaceholder-${index}`).style.display = 'block';
                            document.getElementById(`sigInfo-${index}`).classList.remove('active');
                            document.getElementById(`validateSig-${index}`).classList.remove('validated');
                            item.assinatura = null;
                            verificarStatus(index);
                            atualizarContadores();
                        };
                        
                        document.getElementById(`validateSig-${index}`).onclick = () => {
                            if (pad.isEmpty()) {
                                alert('Faça a assinatura antes de validar');
                                return;
                            }
                            
                            item.assinatura = pad.toDataURL();
                            document.getElementById(`sigInfo-${index}`).classList.add('active');
                            document.getElementById(`validateSig-${index}`).classList.add('validated');
                            verificarStatus(index);
                            atualizarContadores();
                        };
                    }
                }, 200);
                
                // Evento da foto
                const photoBtn = card.querySelector('.btn-photo');
                photoBtn.addEventListener('click', () => abrirCamera(index));
            });
            
            atualizarContadores();
        }

        // Verificar status do item (só fica VERIFICADO se tiver serial, conferente e assinatura)
        function verificarStatus(index) {
            if (!currentTecnico) return;
            const item = registros[currentTecnico.tr].itens[index];
            
            // Verifica se tem todos os campos
            const temSerial = item.serial && item.serial.trim() !== '';
            const temConferente = item.conferente && item.conferente.trim() !== '';
            const temAssinatura = item.assinatura !== null;
            
            // Só fica verificado se tiver tudo
            item.verificado = temSerial && temConferente && temAssinatura;
            
            // Atualiza a cor do card
            const card = itensContainer.children[index];
            if (card) {
                if (item.verificado) {
                    card.classList.add('verified');
                    const badge = card.querySelector('.status-badge');
                    badge.className = 'status-badge verified';
                    badge.textContent = 'VERIFICADO';
                } else {
                    card.classList.remove('verified');
                    const badge = card.querySelector('.status-badge');
                    badge.className = 'status-badge pending';
                    badge.textContent = 'PENDENTE';
                }
            }
            
            atualizarContadores();
        }

        // Câmera
        async function abrirCamera(index) {
            currentItemIndex = index;
            currentPhotoData = null;
            
            try {
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
                
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: false 
                });
                
                video.srcObject = mediaStream;
                await video.play();
                
                photo.style.display = 'none';
                video.style.display = 'block';
                capturePhoto.style.display = 'inline-block';
                retakePhoto.style.display = 'none';
                
                cameraModal.classList.add('active');
            } catch (error) {
                alert('Erro ao acessar câmera: ' + error.message);
            }
        }

        capturePhoto.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            currentPhotoData = canvas.toDataURL('image/jpeg', 0.8);
            photo.src = currentPhotoData;
            
            video.style.display = 'none';
            photo.style.display = 'block';
            capturePhoto.style.display = 'none';
            retakePhoto.style.display = 'inline-block';
        });

        retakePhoto.addEventListener('click', () => {
            currentPhotoData = null;
            photo.src = '';
            video.style.display = 'block';
            photo.style.display = 'none';
            capturePhoto.style.display = 'inline-block';
            retakePhoto.style.display = 'none';
        });

        savePhoto.addEventListener('click', () => {
            if (!currentPhotoData || !currentTecnico || currentItemIndex === null) {
                alert('Tire uma foto');
                return;
            }
            
            registros[currentTecnico.tr].itens[currentItemIndex].foto = currentPhotoData;
            
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            
            cameraModal.classList.remove('active');
            renderizarItens();
        });

        closeModal.addEventListener('click', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            cameraModal.classList.remove('active');
        });

        // Contadores
        function atualizarContadores() {
            if (!currentTecnico) return;
            
            const itens = registros[currentTecnico.tr].itens;
            const verificados = itens.filter(i => i.verificado).length;
            const fotos = itens.filter(i => i.foto).length;
            const assinaturas = itens.filter(i => i.assinatura).length;
            const conferentes = itens.filter(i => i.conferente && i.conferente.trim() !== '').length;
            
            verificadosCount.textContent = verificados;
            fotosCount.textContent = fotos;
            assinaturasCount.textContent = assinaturas;
            conferentesCount.textContent = conferentes;
            
            const progresso = (verificados / 10) * 100;
            progressFill.style.width = `${progresso}%`;
        }

        // Reset
        resetAll.addEventListener('click', () => {
            if (!currentTecnico) return;
            if (confirm('Resetar todos os itens?')) {
                registros[currentTecnico.tr].itens = Array(10).fill(null).map((_, index) => ({
                    id: index + 1,
                    serial: '',
                    conferente: '',
                    assinatura: null,
                    verificado: false,
                    foto: null
                }));
                renderizarItens();
            }
        });

        // Export PDF
        exportPDF.addEventListener('click', async () => {
            if (!currentTecnico) return;
            
            const registro = registros[currentTecnico.tr];
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            
            // Cabeçalho
            doc.setFillColor(44, 62, 80);
            doc.rect(0, 0, 210, 35, 'F');
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(18);
            doc.setFont('helvetica', 'bold');
            doc.text('RELATÓRIO DE CONTROLE LOGÍSTICO', 105, 18, { align: 'center' });
            doc.setFontSize(12);
            doc.text('Registro com Assinaturas Digitais', 105, 28, { align: 'center' });
            
            // Info técnico
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            doc.setFont('helvetica', 'bold');
            doc.text('Dados do Técnico:', 15, 45);
            doc.setFont('helvetica', 'normal');
            doc.text(`Funcionário: ${currentTecnico.funcionario}`, 15, 52);
            doc.text(`TR: ${currentTecnico.tr} | TT: ${currentTecnico.tt}`, 15, 59);
            doc.text(`Supervisor: ${currentTecnico.supervisor}`, 15, 66);
            doc.text(`Data: ${new Date().toLocaleDateString('pt-BR')}`, 15, 73);
            
            let yPos = 85;
            
            // Itens
            registro.itens.forEach((item, index) => {
                if (yPos > 250) {
                    doc.addPage();
                    yPos = 20;
                }
                
                // Fundo do item
                doc.setFillColor(245, 247, 250);
                doc.rect(15, yPos - 5, 180, item.foto ? 60 : 35, 'F');
                doc.setDrawColor(200, 200, 200);
                doc.rect(15, yPos - 5, 180, item.foto ? 60 : 35);
                
                // Texto
                doc.setFont('helvetica', 'bold');
                doc.text(`Item ${index + 1}:`, 20, yPos);
                doc.setFont('helvetica', 'normal');
                doc.text(`Serial: ${item.serial || '---'}`, 50, yPos);
                doc.text(`Conferente: ${item.conferente || '---'}`, 50, yPos + 7);
                
                // Status VERIFICADO só aparece se tiver todos os campos
                if (item.verificado) {
                    doc.setTextColor(72, 187, 120);
                    doc.setFont('helvetica', 'bold');
                    doc.text('VERIFICADO: SIM', 50, yPos + 14);
                    doc.setTextColor(0, 0, 0);
                    doc.setFont('helvetica', 'normal');
                } else {
                    doc.setTextColor(200, 0, 0);
                    doc.setFont('helvetica', 'bold');
                    doc.text('VERIFICADO: NÃO', 50, yPos + 14);
                    doc.setTextColor(0, 0, 0);
                    doc.setFont('helvetica', 'normal');
                }
                
                // Assinatura
                if (item.assinatura) {
                    try {
                        doc.addImage(item.assinatura, 'PNG', 100, yPos - 3, 40, 15);
                    } catch (e) {
                        doc.text('Assinatura digital', 100, yPos + 5);
                    }
                }
                
                // Foto
                if (item.foto) {
                    try {
                        doc.addImage(item.foto, 'JPEG', 145, yPos - 2, 40, 40);
                    } catch (e) {
                        doc.text('Foto', 150, yPos + 10);
                    }
                }
                
                yPos += item.foto ? 65 : 40;
            });
            
            // Rodapé
            doc.setTextColor(100, 100, 100);
            doc.setFontSize(8);
            doc.text(`Gerado em: ${new Date().toLocaleString('pt-BR')}`, 105, 285, { align: 'center' });
            
            doc.save(`controle_${currentTecnico.tr}_${new Date().toISOString().slice(0,10)}.pdf`);
        });

        // Eventos
        supervisorFilter.addEventListener('change', atualizarTecnicos);
        
        tecnicoFilter.addEventListener('change', function() {
            if (this.value) {
                selecionarTecnico(this.value);
            } else {
                tecnicoContent.style.display = 'none';
                currentTecnico = null;
            }
        });
        
        resetFilters.addEventListener('click', () => {
            supervisorFilter.value = '';
            tecnicoFilter.innerHTML = '<option value="">Selecione um técnico</option>';
            tecnicoFilter.disabled = false;
            tecnicoContent.style.display = 'none';
            currentTecnico = null;
            atualizarTecnicos();
        });

        // Iniciar
        inicializarSupervisores();
    </script>
</body>
</html>
